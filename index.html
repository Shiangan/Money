<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>祥安生命 帳款系統</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap');
:root{
  --gold:#c9a84c;--gold2:#e8c97a;--gold3:#7a6030;
  --bg:#0d0b08;--bg2:#181510;--bg3:#211e14;--bg4:#2a261a;--bg5:#332e20;
  --t1:#f0e6cc;--t2:#9a8a68;--t3:#5a5040;
  --red:#c0392b;--green:#27ae60;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:'Noto Sans TC',sans-serif;}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;}
.screen.on{display:block;}

/* ── LOGIN ── */
#s-login{display:none;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;min-height:100vh;}
#s-login.on{display:flex;}
.login-emblem{font-family:'Noto Serif TC',serif;font-size:30px;color:var(--gold);letter-spacing:5px;text-align:center;}
.login-sub{font-size:12px;color:var(--t2);letter-spacing:3px;margin:6px 0 34px;text-align:center;}
.login-box{background:var(--bg3);border:1px solid var(--gold3);border-radius:16px;padding:24px;width:100%;max-width:340px;}
.login-box h2{font-family:'Noto Serif TC',serif;font-size:15px;color:var(--gold);letter-spacing:2px;margin-bottom:18px;text-align:center;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:11px;color:var(--t2);margin-bottom:5px;letter-spacing:1px;}
.fg input,.fg select{width:100%;background:var(--bg4);border:1px solid #3a3425;border-radius:8px;color:var(--t1);font-size:14px;font-family:'Noto Sans TC',sans-serif;padding:11px 13px;outline:none;-webkit-appearance:none;appearance:none;}
.fg input:focus{border-color:var(--gold3);}
.btn-login{width:100%;background:linear-gradient(135deg,#7a5a10,var(--gold));border:none;border-radius:10px;color:#1a1208;font-size:15px;font-weight:700;font-family:'Noto Sans TC',sans-serif;padding:13px;cursor:pointer;letter-spacing:2px;margin-top:4px;}
.err{color:var(--red);font-size:12px;text-align:center;margin-top:10px;min-height:16px;}

/* ── HEADER ── */
.hdr{background:linear-gradient(180deg,#100e08,var(--bg2));border-bottom:1px solid var(--gold3);padding:11px 15px;position:sticky;top:0;z-index:300;}
.hdr-row{display:flex;align-items:center;justify-content:space-between;}
.hdr-title{font-family:'Noto Serif TC',serif;font-size:17px;color:var(--gold);letter-spacing:2px;}
.hdr-info{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--t2);}
.rbadge{border-radius:4px;padding:2px 7px;font-size:10px;}
.rb-admin{background:#2a1a0e;color:#e09050;}
.rb-staff{background:#0e1e2e;color:#5aaae0;}
.sync-line{font-size:10px;color:var(--t3);text-align:right;margin-top:3px;}

/* ── NAV ── */
.nav{display:flex;background:var(--bg2);border-bottom:1px solid #2a2518;position:sticky;top:52px;z-index:299;}
.nav button{flex:1;padding:10px 2px;background:none;border:none;color:var(--t2);font-size:12px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;border-bottom:2px solid transparent;transition:.2s;letter-spacing:1px;}
.nav button.on{color:var(--gold);border-bottom-color:var(--gold);}

/* ── PAGES ── */
.pg{display:none;padding:13px;padding-bottom:90px;}
.pg.on{display:block;}

/* ── CARDS ── */
.card{background:var(--bg3);border:1px solid #2a2518;border-radius:12px;padding:14px;margin-bottom:10px;}
.ctitle{font-family:'Noto Serif TC',serif;font-size:13px;color:var(--gold);letter-spacing:2px;margin-bottom:12px;}
label{display:block;font-size:11px;color:var(--t2);margin-bottom:4px;margin-top:11px;letter-spacing:1px;}
label:first-child{margin-top:0;}
select,input[type=text],input[type=number],input[type=date],input[type=month],input[type=password]{
  width:100%;background:var(--bg4);border:1px solid #3a3425;border-radius:8px;
  color:var(--t1);font-size:14px;font-family:'Noto Sans TC',sans-serif;
  padding:10px 12px;outline:none;-webkit-appearance:none;appearance:none;
}
select:focus,input:focus{border-color:var(--gold3);}
option{background:var(--bg3);}
textarea{width:100%;background:var(--bg4);border:1px solid #3a3425;border-radius:8px;color:var(--t1);font-size:14px;font-family:'Noto Sans TC',sans-serif;padding:10px 12px;outline:none;resize:none;height:68px;line-height:1.6;}
.r2{display:flex;gap:8px;}.r2>div{flex:1;}

/* ── BUTTONS ── */
.bgold{width:100%;background:linear-gradient(135deg,#7a5a10,var(--gold));border:none;border-radius:10px;color:#1a1208;font-size:15px;font-weight:700;font-family:'Noto Sans TC',sans-serif;padding:13px;cursor:pointer;letter-spacing:2px;margin-top:13px;}
.bghost{background:none;border:1px solid #3a3425;border-radius:8px;color:var(--t2);font-size:13px;font-family:'Noto Sans TC',sans-serif;padding:8px 14px;cursor:pointer;}
.bsm{background:none;border:1px solid #3a3425;border-radius:6px;color:var(--t2);font-size:11px;font-family:'Noto Sans TC',sans-serif;padding:4px 9px;cursor:pointer;white-space:nowrap;}
.bsm.d{border-color:#c0392b44;color:var(--red);}
.bsm.s{border-color:#27ae6044;color:var(--green);}
.bsm.p{border-colorvar(--gold3);color:var(--gold);}
.bsm:disabled{opacity:.3;cursor:not-allowed;}

/* ── CHIPS ── */
.chip{display:inline-block;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:500;white-space:nowrap;}
.c明得堂{background:#0e1e2e;color:#5aaae0;}
.c無名祭品{background:#2a0e0e;color:#e07070;}
.c烹廚祭品{background:#0e2a0e;color:#70e070;}
.c法事{background:#1e0e2a;color:#c070e0;}
.c今榮租車{background:#2a1e0e;color:#e0b050;}

/* ── CASE CARDS ── */
.ccase{background:var(--bg3);border:1px solid #2a2518;border-radius:12px;margin-bottom:10px;overflow:hidden;}
.ccase-hd{padding:13px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.ccase-name{font-family:'Noto Serif TC',serif;font-size:16px;color:var(--gold);}
.ccase-meta{font-size:11px;color:var(--t2);margin-top:2px;line-height:1.6;}
.ccase-r{text-align:right;}
.ccase-total{font-size:17px;font-weight:600;}
.ccase-sub{font-size:11px;color:var(--t2);margin-top:2px;}
.ccase-chips{display:flex;gap:5px;flex-wrap:wrap;padding:0 14px 11px;}
.ccase-body{background:var(--bg4);border-top:1px solid #2a2518;padding:13px 14px;display:none;}
.ccase-body.open{display:block;}

.vblock{margin-bottom:12px;}
.vblock-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.vbox{background:var(--bg5);border-radius:8px;padding:9px 11px;}
.eline{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid #2a2518;}
.eline:last-child{border-bottom:none;}
.einfo{flex:1;}
.ename{font-size:13px;color:var(--t1);}
.edetail{font-size:11px;color:var(--t2);margin-top:2px;line-height:1.6;}
.enote{font-size:11px;color:var(--t3);font-style:italic;margin-top:1px;}
.edate{font-size:10px;color:var(--t3);margin-top:2px;}
.eprice{font-size:14px;color:var(--gold);font-weight:500;white-space:nowrap;}
.vsub{display:flex;justify-content:flex-end;font-size:12px;color:var(--t2);margin-top:5px;}
.vsub strong{color:var(--t1);margin-left:5px;}
.arow{display:flex;gap:7px;margin-top:11px;padding-top:11px;border-top:1px solid #2a2518;flex-wrap:wrap;}

/* ── ITEM PICKER ── */
.isearch{position:relative;margin-bottom:7px;}
.isearch input{padding-left:32px;}
.isearch::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;max-height:230px;overflow-y:auto;}
.ibtn{background:var(--bg4);border:1px solid #3a3425;border-radius:8px;color:var(--t1);padding:8px;font-size:12px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;text-align:left;line-height:1.5;transition:.15s;}
.ibtn.sel{background:#2a2010;border-color:var(--gold3);}
.ibtn .in{display:block;font-size:12px;}
.ibtn .ip{display:block;color:var(--gold);font-size:11px;}
.srow{display:flex;align-items:center;gap:7px;background:var(--bg4);border-radius:8px;padding:7px 10px;margin-bottom:5px;}
.sname{flex:1;font-size:13px;}
.sqty{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--t2);}
.sqty input{width:46px;text-align:center;font-size:13px;padding:4px 6px;}
.sprice{font-size:13px;color:var(--gold);min-width:52px;text-align:right;}
.srem{background:none;border:none;color:var(--red);font-size:16px;cursor:pointer;padding:0 2px;}

/* ── STATS ── */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.sbox{background:var(--bg3);border:1px solid #2a2518;border-radius:10px;padding:12px;text-align:center;}
.snum{font-size:20px;font-weight:600;color:var(--gold);}
.slbl{font-size:11px;color:var(--t2);margin-top:3px;}
.sumrow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #2a2518;font-size:14px;}
.sumrow:last-child{border-bottom:none;}
.sumamt{color:var(--gold);font-weight:500;}
.sumsub{font-size:11px;color:var(--t2);margin-top:2px;}

/* ── FILTERS ── */
.frow{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:11px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.frow::-webkit-scrollbar{display:none;}
.fbtn{background:var(--bg3);border:1px solid #3a3425;border-radius:18px;color:var(--t2);font-size:12px;font-family:'Noto Sans TC',sans-serif;padding:5px 12px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.fbtn.on{background:#2a2010;border-color:var(--gold3);color:var(--gold);}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:none;align-items:flex-end;}
.overlay.open{display:flex;}
.modal{background:var(--bg2);border-radius:16px 16px 0 0;border-top:1px solid var(--gold3);padding:20px 16px;width:100%;max-height:93vh;overflow-y:auto;}
.mtitle{font-family:'Noto Serif TC',serif;font-size:15px;color:var(--gold);letter-spacing:2px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center;}
.mclose{background:none;border:none;color:var(--t2);font-size:22px;cursor:pointer;padding:0;}

/* ── MISC ── */
.divider{height:1px;background:#2a2518;margin:11px 0;}
.bpaid{display:inline-block;background:#27ae6022;color:var(--green);border-radius:4px;padding:1px 7px;font-size:10px;}
.bunpaid{display:inline-block;background:#c0392b22;color:var(--red);border-radius:4px;padding:1px 7px;font-size:10px;}
.empty{text-align:center;padding:44px 16px;color:var(--t2);font-size:14px;line-height:2;}
.empty .ico{font-size:36px;margin-bottom:10px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--gold);color:#1a1208;border-radius:20px;padding:9px 20px;font-size:13px;font-weight:600;opacity:0;transition:.25s;z-index:999;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.loading{text-align:center;padding:30px;color:var(--t2);}
.spin{display:inline-block;width:20px;height:20px;border:2px solid var(--gold3);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes sp{to{transform:rotate(360deg);}}
.urow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #2a2518;}
.urow:last-child{border-bottom:none;}
.pitem-row{display:flex;justify-content:space-between;align-items:center;padding:8px;background:var(--bg4);margin-bottom:5px;border-radius:6px;font-size:13px;}
</style>
</head>
<body>

<div id="s-login" class="on">
  <div class="login-emblem">祥安生命</div>
  <div class="login-sub">葬儀帳款管理系統</div>
  <div class="login-box">
    <h2>員工登入</h2>
    <div class="fg"><label>帳號</label><input id="lu" type="text" placeholder="輸入帳號" autocomplete="username"></div>
    <div class="fg"><label>密碼</label><input id="lp" type="password" placeholder="輸入密碼" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-login" onclick="doLogin()">登入</button>
    <div class="err" id="lerr"></div>
    <div style="font-size:11px;color:var(--t3);text-align:center;margin-top:14px;line-height:2;">
      預設帳號：admin / boss1234<br>員工：staff1 / staff123
    </div>
  </div>
</div>

<div id="s-app" class="screen">
  <div class="hdr">
    <div class="hdr-row">
      <div class="hdr-title">葬儀帳款</div>
      <div class="hdr-info">
        <span id="hname"></span>
        <span id="hrole" class="rbadge"></span>
        <button class="bsm" onclick="doLogout()">登出</button>
      </div>
    </div>
    <div class="sync-line" id="syncLine">⏳ 載入中...</div>
  </div>
  <div class="nav">
    <button class="on" onclick="showPg('cases')">📋 案件</button>
    <button onclick="showPg('stats')">📊 統計</button>
    <button id="adminTab" onclick="showPg('admin')" style="display:none">⚙️ 管理</button>
  </div>

  <div id="pg-cases" class="pg on">
    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <input type="text" id="qcase" placeholder="🔍 搜尋亡者姓名..." oninput="renderCases()" style="flex:1;">
      <select id="qstatus" onchange="renderCases()" style="width:88px;">
        <option value="">全部</option><option value="0">未結清</option><option value="1">已結清</option>
      </select>
    </div>
    <div class="frow" id="cMonthF"></div>
    <div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
      <button class="bghost" onclick="openNewCase()">＋ 新增案件</button>
    </div>
    <div id="caseList"></div>
  </div>

  <div id="pg-stats" class="pg">
    <div class="frow" id="sMonthF"></div>
    <div class="sgrid" id="sgrid"></div>
    <div class="card"><div class="ctitle">🏢 廠商統計</div><div id="vstats"></div></div>
    <div class="card"><div class="ctitle">📅 月份統計</div><div id="mstats"></div></div>
  </div>

  <div id="pg-admin" class="pg">
    <div class="card">
      <div class="ctitle">🏢 廠商與品項常駐管理</div>
      <div class="r2">
        <div>
          <label>選擇廠商</label>
          <select id="adm-v" onchange="renderAdminItems()">
            <option>明得堂</option><option>無名祭品</option><option>烹廚祭品</option><option>法事</option><option>今榮租車</option>
          </select>
        </div>
        <div>
          <label>新增常用細項</label>
          <button class="bsm p" style="width:100%; height:40px; margin-top:4px;" onclick="openAddDbItem()">＋ 新增品項到資料庫</button>
        </div>
      </div>
      <div class="divider"></div>
      <div style="font-size:12px; color:var(--t2); margin-bottom:8px;">該廠商已累積的自訂細項：</div>
      <div id="admin-item-list" style="max-height:200px; overflow-y:auto;"></div>
    </div>

    <div class="card">
      <div class="ctitle">👥 帳號管理</div>
      <div id="ulist"></div>
      <button class="bghost" style="margin-top:12px;width:100%;" onclick="openAddUser()">＋ 新增帳號</button>
    </div>
    <div class="card">
      <div class="ctitle">💾 資料備份</div>
      <button class="bghost" style="width:100%;margin-bottom:8px;" onclick="exportData()">📤 匯出 JSON</button>
      <button class="bghost" style="width:100%;" onclick="document.getElementById('impf').click()">📥 匯入資料</button>
      <input type="file" id="impf" accept=".json" style="display:none;" onchange="importData(event)">
    </div>
  </div>
</div>

<div class="overlay" id="mAddDbItem">
  <div class="modal">
    <div class="mtitle">累積新細項到品項庫 <button class="mclose" onclick="closeM('mAddDbItem')">✕</button></div>
    <label>所屬廠商</label>
    <select id="dbi-v">
      <option>明得堂</option><option>無名祭品</option><option>烹廚祭品</option><option>法事</option><option>今榮租車</option>
    </select>
    <label>品項細項名稱</label>
    <input type="text" id="dbi-n" placeholder="例：高級斧頭組(皮革套+客製)">
    <div class="r2">
      <div><label>單位</label><input type="text" id="dbi-u" placeholder="個、套、包、條"></div>
      <div><label>常規單價</label><input type="number" id="dbi-p" placeholder="0"></div>
    </div>
    <button class="bgold" onclick="saveItemToDb()">確認永久累積</button>
  </div>
</div>

<div class="overlay" id="mNewCase">
  <div class="modal">
    <div class="mtitle">新增案件 <button class="mclose" onclick="closeM('mNewCase')">✕</button></div>
    <label>亡者姓名</label><input type="text" id="nc-n" placeholder="例：陳呂玉麵">
    <div class="r2">
      <div><label>往生日期</label><input type="date" id="nc-d"></div>
      <div><label>帳款月份</label><input type="month" id="nc-m"></div>
    </div>
    <label>承辦人員</label><input type="text" id="nc-s">
    <label>備註</label><input type="text" id="nc-note" placeholder="選填">
    <button class="bgold" onclick="saveNewCase()">建立案件</button>
  </div>
</div>

<div class="overlay" id="mAddExp">
  <div class="modal">
    <div class="mtitle" id="expTitle">新增費用 <button class="mclose" onclick="closeM('mAddExp')">✕</button></div>
    <label>廠商類別</label>
    <select id="ev" onchange="onEV()">
      <option value="">選擇廠商</option>
      <option>明得堂</option><option>無名祭品</option><option>烹廚祭品</option><option>法事</option><option>今榮租車</option>
    </select>
    <label>費用說明 (可不填，由下方品項自動帶入)</label>
    <input type="text" id="el" placeholder="例：頭七法事、三牲四果">
    <div id="eItemSec" style="display:none;margin-top:11px;">
      <div style="font-size:12px;color:var(--t2);margin-bottom:7px;">從品項選擇 (包含已累積的項目)</div>
      <div class="isearch"><input type="text" id="esrch" placeholder="搜尋品項..." oninput="renderEItems()"></div>
      <div class="igrid" id="egrid"></div>
      <div id="eselblk"></div>
      <div class="divider"></div>
      <div style="font-size:12px;color:var(--t2);margin-bottom:7px;">臨時單次品項</div>
      <div class="r2"><div><input type="text" id="ecn" placeholder="品項名稱"></div><div><input type="number" id="ecp" placeholder="單價"></div></div>
      <button class="bghost" style="margin-top:6px;width:100%;" onclick="addEC()">＋ 加入</button>
    </div>
    <div class="r2" style="margin-top:11px;">
      <div><label>金額（元）</label><input type="number" id="eamt" placeholder="0"></div>
      <div><label>日期</label><input type="date" id="edate"></div>
    </div>
    <label>備註</label><input type="text" id="enote" placeholder="選填">
    <button class="bgold" id="eSaveBtn" onclick="saveExp()">儲存費用</button>
  </div>
</div>

<div class="overlay" id="mAddUser">
  <div class="modal">
    <div class="mtitle">新增帳號 <button class="mclose" onclick="closeM('mAddUser')">✕</button></div>
    <label>姓名</label><input type="text" id="un-name" placeholder="例：小美">
    <label>帳號</label><input type="text" id="un-user" placeholder="英文帳號">
    <label>密碼</label><input type="password" id="un-pass" placeholder="至少6位">
    <label>角色</label>
    <select id="un-role">
      <option value="staff">員工（可新增，不可刪除）</option>
      <option value="admin">老闆（完整權限）</option>
    </select>
    <button class="bgold" onclick="saveUser()">建立帳號</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY_CASES = 'xiang_an_cases';

// 混合本地與端雲儲存器
async function cloudGet(key) {
  try {
    if (window.storage && typeof window.storage.get === 'function') {
      const result = await window.storage.get(key);
      if (!result) return null;
      return JSON.parse(result.value);
    } else {
      const localValue = localStorage.getItem(key);
      return localValue ? JSON.parse(localValue) : null;
    }
  } catch(e) { 
    const localValue = localStorage.getItem(key);
    return localValue ? JSON.parse(localValue) : null;
  }
}

async function cloudSet(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
    if (window.storage && typeof window.storage.set === 'function') {
      await window.storage.set(key, JSON.stringify(value));
    }
    return true;
  } catch(e) { return false; }
}

// ═══════════════════════════════════════════════════════
// 初始化
// ═══════════════════════════════════════════════════════
async function init() {
  setSyncLine('⏳ 連線本地與雲端資料庫...');

  // 讀取自訂帳號
  const cloudUsers = await cloudGet(STORAGE_KEY_USERS);
  users = cloudUsers || DEFAULT_USERS;
  if (!cloudUsers) await cloudSet(STORAGE_KEY_USERS, users);

  // 讀取案件
  const cloudCases = await cloudGet(STORAGE_KEY_CASES);
  cases = cloudCases || [];

  // 讀取永久自訂細項
  const cloudCustom = await cloudGet(STORAGE_KEY_CUSTOM_ITEMS);
  customItems = cloudCustom || { '明得堂':[], '無名祭品':[], '烹廚祭品':[], '法事':[], '今榮租車':[] };
  mergeCustomItems();

  setSyncLine('✓ 資料庫已就緒');

  const sid = sessionStorage.getItem('xian_sid');
  if (sid) {
    const u = users.find(x => x.id === parseInt(sid));
    if (u) { loginAs(u); return; }
  }
}

// 合併內建基礎品項與使用者後來永久累積的細項
function mergeCustomItems() {
  VI = JSON.parse(JSON.stringify(BASE_VI)); // 重置
  Object.keys(customItems).forEach(v => {
    if (VI[v]) {
      // 避免重複加入
      customItems[v].forEach(cItem => {
        if (!VI[v].some(base => base.n === cItem.n)) {
          VI[v].push(cItem);
        }
      });
    }
  });
}

function setSyncLine(msg) {
  const el = document.getElementById('syncLine');
  if (el) el.textContent = msg;
}

function doLogin() {

  if (!found) { document.getElementById('lerr').textContent = '帳號或密碼錯誤'; return; }

}

function loginAs(user) {
  CU = user;
  sessionStorage.setItem('xian_sid', user.id);
  document.getElementById('s-login').classList.remove('on');
  document.getElementById('s-app').classList.add('on');
  document.getElementById('hname').textContent = user.name;
  const rb = document.getElementById('hrole');
  rb.textContent = user.role === 'admin' ? '老闆' : '員工';
  rb.className = 'rbadge ' + (user.role === 'admin' ? 'rb-admin' : 'rb-staff');
  
  // 開放管理分頁給所有人，方便員工也能動態追加累積廠商細項
  document.getElementById('adminTab').style.display = 'block';
  
  setSyncLine('✓ 已登入・資料即時同步');
  renderCases(); renderStats();
  renderAdminItems();
  if (user.role === 'admin') renderUList();
}

function doLogout() {
  sessionStorage.removeItem('xian_sid');
  CU = null;
  document.getElementById('s-app').classList.remove('on');
  document.getElementById('s-login').classList.add('on');
}

function openAddDbItem() {
  const currentV = document.getElementById('adm-v').value;
  document.getElementById('dbi-v').value = currentV;
  document.getElementById('dbi-n').value = '';
  document.getElementById('dbi-u').value = '';
  document.getElementById('dbi-p').value = '';
  openM('mAddDbItem');
}

async function saveItemToDb() {
  const v = document.getElementById('dbi-v').value;
  const n = document.getElementById('dbi-n').value.trim();
  const u = document.getElementById('dbi-u').value.trim() || '個';
  const p = parseFloat(document.getElementById('dbi-p').value) || 0;

  if (!n) { showToast('請輸入品項名稱'); return; }

  if (!customItems[v]) customItems[v] = [];
  
  // 檢查是否在大水庫重複
  if (VI[v].some(item => item.n === n)) {
    showToast('該品項名稱已存在，不需重複建立');
    return;
  }

  customItems[v].push({ n, u, p });
  await cloudSet(STORAGE_KEY_CUSTOM_ITEMS, customItems);
  
  mergeCustomItems(); // 重新合併
  renderAdminItems(); // 重新整理管理畫面清單
  closeM('mAddDbItem');
  showToast(`✓ 已成功累積至【${v}】常駐選單中`);
}

function renderAdminItems() {
  const v = document.getElementById('adm-v').value;
  const listDiv = document.getElementById('admin-item-list');
  const items = VI[v] || [];
  
  if(!items.length) {
    listDiv.innerHTML = '<div style="color:var(--t3); padding:8px;">尚無品項</div>';
    return;
  }

  listDiv.innerHTML = items.map((it, idx) => {
    // 判斷是否為後來才自訂加入的（提供刪除按鈕）
    const isCustom = customItems[v] && customItems[v].some(c => c.n === it.n);
    return `<div class="pitem-row">
      <div><strong>${it.n}</strong> <span style="color:var(--t2); font-size:11px;">(${it.u})</span></div>
      <div style="color:var(--gold); display:flex; align-items:center; gap:10px;">
        $${it.p.toLocaleString()}
        ${isCustom ? `<button class="bsm d" style="padding:2px 6px;" onclick="deleteDbItem('${v}','${it.n}')">刪除</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

async function deleteDbItem(v, name) {
  if (!confirm(`確定要將【${name}】從常駐選單中移除嗎？`)) return;
  if (customItems[v]) {
    customItems[v] = customItems[v].filter(c => c.n !== name);
    await cloudSet(STORAGE_KEY_CUSTOM_ITEMS, customItems);
    mergeCustomItems();
    renderAdminItems();
    showToast('已自選單移出');
  }
}

// 案件功能

function openNewCase() {
  const t = new Date();
  document.getElementById('nc-n').value = '';
  document.getElementById('nc-note').value = '';
  document.getElementById('nc-s').value = CU ? CU.name : '';
  document.getElementById('nc-d').value = t.toISOString().split('T')[0];
  document.getElementById('nc-m').value = t.toISOString().substring(0, 7);
  openM('mNewCase');
}

async function saveNewCase() {
  const name = document.getElementById('nc-n').value.trim();
  if (!name) { showToast('請輸入亡者姓名'); return; }
  const c = {
    id: Date.now(), name,
    date: document.getElementById('nc-d').value,
    month: document.getElementById('nc-m').value,
    staff: document.getElementById('nc-s').value.trim() || (CU ? CU.name : ''),
    note: document.getElementById('nc-note').value.trim(),
    paid: false, expenses: [],
    createdBy: CU ? CU.name : 'System',
    createdAt: new Date().toISOString()
  };
  cases.unshift(c);
  await syncCases();
  closeM('mNewCase');
  showToast('✓ 案件已建立');
  renderCases(); renderStats();
}

async function deleteCase(id) {
  if (!CU || CU.role !== 'admin') { showToast('⚠️ 僅老闆可刪除案件'); return; }
  if (!confirm('確定刪除此案件及所有費用？')) return;
  cases = cases.filter(c => c.id !== id);
  await syncCases();
  renderCases(); renderStats();
  showToast('已刪除');
}

async function togglePaid(id) {
  if (!CU || CU.role !== 'admin') { showToast('⚠️ 僅老闆可變更結清狀態'); return; }
  const c = cases.find(x => x.id === id);
  if (c) { c.paid = !c.paid; await syncCases(); renderCases(); renderStats(); }
}

function onEV() {
  eSel = [];
  const v = document.getElementById('ev').value;
  document.getElementById('esrch').value = '';
  document.getElementById('eItemSec').style.display = v ? 'block' : 'none';
  if (v) renderEItems();
  renderESel(); recalcE();
}

function renderEItems() {
  const v = document.getElementById('ev').value;
  const q = document.getElementById('esrch').value.toLowerCase();
  const items = (VI[v] || []).filter(it => !q || it.n.toLowerCase().includes(q));
  
  document.getElementById('egrid').innerHTML = items.map((it) => {
    const gi = (VI[v] || []).findIndex(x => x.n === it.n);
    const sel = eSel.find(s => s.name === it.n && !s.custom);
    return `<button class="ibtn ${sel ? 'sel' : ''}" onclick="toggleEI(${gi})">
      <span class="in">${it.n}</span>
      <span class="ip">${it.u}${it.p > 0 ? ' $' + it.p : ' (另計)'}</span>
    </button>`;
  }).join('');
}

function toggleEI(i) {
  const v = document.getElementById('ev').value;
  const it = (VI[v] || [])[i]; if (!it) return;
  const idx = eSel.findIndex(s => s.name === it.n && !s.custom);
  if (idx >= 0) eSel.splice(idx, 1);
  else eSel.push({ name: it.n, price: it.p, qty: 1, unit: it.u, custom: false });
  renderEItems(); renderESel(); recalcE();
}

function addEC() {
  const name = document.getElementById('ecn').value.trim();
  const price = parseFloat(document.getElementById('ecp').value) || 0;
  if (!name) { showToast('請輸入品項名稱'); return; }
  eSel.push({ name, price, qty: 1, unit: '', custom: true });
  document.getElementById('ecn').value = '';
  document.getElementById('ecp').value = '';
  renderESel(); recalcE();
}

function removeEI(i) {
  const it = eSel[i]; eSel.splice(i, 1);
  if (!it.custom) renderEItems();
  renderESel(); recalcE();
}

function changeEQ(i, v) { 
  eSel[i].qty = Math.max(1, parseInt(v) || 1); 
  recalcE(); 
}

function renderESel() {
  const div = document.getElementById('eselblk');
  if (!eSel.length) { div.innerHTML = ''; return; }
  div.innerHTML = `<div class="divider"></div>` + eSel.map((s, i) => `
    <div class="srow">
      <span class="sname">${s.name}</span>
      <div class="sqty"><span>數量</span><input type="number" value="${s.qty}" min="1" oninput="changeEQ(${i},this.value)"></div>
      <span class="sprice">${s.price > 0 ? '$' + (s.price * s.qty).toLocaleString() : '-'}</span>
      <button class="srem" onclick="removeEI(${i})">✕</button>
    </div>`).join('');
}

function recalcE() {
  const t = eSel.reduce((s, it) => s + (it.price * it.qty), 0);
  if (t > 0) document.getElementById('eamt').value = t;
}

async function saveExp() {
  if (!activeCID) return;
  const vendor = document.getElementById('ev').value;
  const label = document.getElementById('el').value.trim();
  const amount = parseFloat(document.getElementById('eamt').value) || 0;
  const date = document.getElementById('edate').value;
  const note = document.getElementById('enote').value.trim();
  if (!vendor) { showToast('請選擇廠商'); return; }
  if (!label && !eSel.length) { showToast('請選擇品項或手動輸入說明'); return; }
  
  const c = cases.find(x => x.id === activeCID); if (!c) return;
  const btn = document.getElementById('eSaveBtn');
  btn.disabled = true; btn.textContent = '儲存中...';
  
  c.expenses.push({
    id: Date.now(), vendor,
    label: label || (eSel.map(s => `${s.name}(${s.qty}${s.unit||'個'})`).join('、')),
    amount, date, note, items: [...eSel],
    addedBy: CU ? CU.name : 'System'
  });
  await syncCases();
  btn.disabled = false; btn.textContent = '儲存費用';
  closeM('mAddExp');
  showToast('✓ 費用已新增並同步');
  renderCases(); renderStats();
}

async function deleteExp(cid, eid) {
  if (!CU || CU.role !== 'admin') { showToast('⚠️ 僅老闆可刪除費用明細'); return; }
  const c = cases.find(x => x.id === cid); if (!c) return;
  if (!confirm('確定要刪除這筆費用明細嗎？')) return;
  c.expenses = c.expenses.filter(e => e.id !== eid);
  await syncCases();
  renderCases(); renderStats();
  showToast('已刪除');
}

async function syncCases() {
  setSyncLine('⏳ 同步中...');
  const ok = await cloudSet(STORAGE_KEY_CASES, cases);
  setSyncLine(ok ? '✓ 已同步・' + new Date().toLocaleTimeString('zh-TW') : '⚠️ 同步失敗，請重試');
}

// ═══════════════════════════════════════════════════════
// 畫面渲染與後台介面處理
// ═══════════════════════════════════════════════════════
function renderCases() {
  const months = [...new Set(cases.map(c => c.month))].filter(Boolean).sort().reverse();
  document.getElementById('cMonthF').innerHTML =
    `<button class="fbtn ${cMonth === 'all' ? 'on' : ''}" onclick="setCM('all')">全部</button>`
    + months.map(m => `<button class="fbtn ${cMonth === m ? 'on' : ''}" onclick="setCM('${m}')">${m.replace('-', '年')}月</button>`).join('');

  const q = document.getElementById('qcase').value.trim();
  const fs = document.getElementById('qstatus').value;
  let f = cases;
  if (cMonth !== 'all') f = f.filter(c => c.month === cMonth);
  if (q) f = f.filter(c => c.name.includes(q));
  if (fs !== '') f = f.filter(c => c.paid === (fs === '1'));

  const list = document.getElementById('caseList');
  if (!f.length) {
    list.innerHTML = `<div class="empty"><div class="ico">🕯️</div>尚無案件紀錄<br>點右上角「新增案件」開始</div>`;
    return;
  }
  list.innerHTML = f.map(c => renderCCard(c)).join('');
}

function setCM(m) { cMonth = m; renderCases(); }

  c.expenses.forEach(e => { if (!vg[e.vendor]) vg[e.vendor] = []; vg[e.vendor].push(e); });

  const body = Object.entries(vg).map(([vn, exps]) => {
    const vs = exps.reduce((s, e) => s + e.amount, 0);
    return `<div class="vblock">
      <div class="vblock-hd">
        <span class="chip c${vn}">${vn}</span>
        <span style="font-size:12px;color:var(--t2)">小計 <strong style="color:var(--t1)">$${vs.toLocaleString()}</strong></span>
      </div>
      <div class="vbox">
        ${exps.map(e => `<div class="eline">
          <div class="einfo">
            <div class="ename">${e.label}</div>
            ${e.note ? `<div class="enote">${e.note}</div>` : ''}
            <div class="edate">${e.date || ''}　登記者：${e.addedBy || ''}</div>
          </div>
          <div style="display:flex;align-items:center;gap:7px">
            <span class="eprice">${e.amount > 0 ? '$' + e.amount.toLocaleString() : '-'}</span>
            ${isA ? `<button class="bsm d" onclick="event.stopPropagation();deleteExp(${c.id},${e.id})">刪</button>` : ''}
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('') || `<div style="color:var(--t2);font-size:13px;text-align:center;padding:14px 0">尚無費用，點「新增費用」開始記帳</div>`;

  return `<div class="ccase">
    <div onclick="toggleBody(${c.id})">
      <div class="ccase-hd">
        <div>
          <div class="ccase-name">${c.name}
            ${c.paid ? '<span class="bpaid">已結清</span>' : '<span class="bunpaid">未結清</span>'}
          </div>
          <div class="ccase-meta">${c.date || ''}${c.staff ? '　承辦：' + c.staff : ''}${c.note ? '　' + c.note : ''}</div>
        </div>
        <div class="ccase-r">
          <div class="ccase-total">$${total.toLocaleString()}</div>
          <div class="ccase-sub">${c.expenses.length} 筆明細　▾</div>
        </div>
      </div>
      <div class="ccase-chips">
        ${vendors.map(v => `<span class="chip c${v}">${v}</span>`).join('')}
      </div>
    </div>
    <div class="ccase-body" id="cb-${c.id}">
      ${body}
      <div class="arow">
        <button class="bsm p" onclick="openAddExp(${c.id})">＋ 新增費用</button>
        ${isA ? `<button class="bsm s" onclick="togglePaid(${c.id})">${c.paid ? '取消結清' : '標記已結清'}</button>` : ''}
        ${isA ? `<button class="bsm d" onclick="deleteCase(${c.id})">刪除案件</button>` : ''}
      </div>
    </div>
  </div>`;
}

function toggleBody(id) {
  const el = document.getElementById('cb-' + id);
  if(el) el.classList.toggle('open');
}

function renderStats() {
  const months = [...new Set(cases.map(c => c.month))].filter(Boolean).sort().reverse();
  document.getElementById('sMonthF').innerHTML =
    `<button class="fbtn ${sMonth === 'all' ? 'on' : ''}" onclick="setSM('all')">全部</button>`
    + months.map(m => `<button class="fbtn ${sMonth === m ? 'on' : ''}" onclick="setSM('${m}')">${m.replace('-', '年')}月</button>`).join('');

  const fc = sMonth === 'all' ? cases : cases.filter(c => c.month === sMonth);
  const allE = fc.flatMap(c => c.expenses);
  const total = allE.reduce((s, e) => s + e.amount, 0);
  const unpaid = fc.filter(c => !c.paid).flatMap(c => c.expenses).reduce((s, e) => s + e.amount, 0);

  document.getElementById('sgrid').innerHTML = `
    <div class="sbox"><div class="snum">$${total.toLocaleString()}</div><div class="slbl">總金額</div></div>
    <div class="sbox"><div class="snum" style="color:var(--red)">$${unpaid.toLocaleString()}</div><div class="slbl">未結清金額</div></div>
    <div class="sbox"><div class="snum">${fc.length}</div><div class="slbl">總案件數量</div></div>
    <div class="sbox"><div class="snum">${allE.length}</div><div class="slbl">費用總筆數</div></div>`;

  const vMap = {};
  allE.forEach(e => { if (!vMap[e.vendor]) vMap[e.vendor] = { t: 0, n: 0 }; vMap[e.vendor].t += e.amount; vMap[e.vendor].n++; });
  document.getElementById('vstats').innerHTML = Object.entries(vMap)
    .sort((a, b) => b[1].t - a[1].t)
    .map(([v, d]) => `<div class="sumrow">
      <div><span class="chip c${v}">${v}</span></div>
      <div style="text-align:right"><div class="sumamt">$${d.t.toLocaleString()}</div><div class="sumsub">${d.n}筆</div></div>
    </div>`).join('') || '<div class="empty" style="padding:20px">尚無資料</div>';

  const mMap = {};
  cases.forEach(c => {
    const m = c.month || '未知';
    if (!mMap[m]) mMap[m] = { t: 0, u: 0, n: 0 };
    const ct = c.expenses.reduce((s, e) => s + e.amount, 0);
    mMap[m].t += ct; mMap[m].n++;
    if (!c.paid) mMap[m].u += ct;
  });
  document.getElementById('mstats').innerHTML = Object.entries(mMap)
    .sort((a, b) => b[0].localeCompare(a[0]))
    .map(([m, d]) => `<div class="sumrow">
      <div><div style="font-size:14px">${m.replace('-', '年')}月</div><div class="sumsub">${d.n}件　未結清 $${d.u.toLocaleString()}</div></div>
      <div class="sumamt">$${d.t.toLocaleString()}</div>
    </div>`).join('') || '<div class="empty" style="padding:20px">尚無資料</div>';
}

function setSM(m) { sMonth = m; renderStats(); }

function renderUList() {
  document.getElementById('ulist').innerHTML = users.map(u => `
    <div class="urow">
      <div>
        <div style="font-size:14px">${u.name}</div>
        <div style="font-size:11px;color:var(--t2)">@${u.username}　${u.role === 'admin' ? '老闆' : '員工'}</div>
      </div>
      ${CU && u.id !== CU.id
        ? `<button class="bsm d" onclick="deleteUser(${u.id})">刪除</button>`
        : '<span style="font-size:11px;color:var(--t3)">（本人）</span>'}
    </div>`).join('');
}

function openAddUser() {
  ['un-name', 'un-user', 'un-pass'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('un-role').value = 'staff';
  openM('mAddUser');
}

async function saveUser() {
  const name = document.getElementById('un-name').value.trim();
  const username = document.getElementById('un-user').value.trim();
  const password = document.getElementById('un-pass').value;
  const role = document.getElementById('un-role').value;
  if (!name || !username || !password) { showToast('請填寫完整'); return; }
  if (password.length < 6) { showToast('密碼至少6位'); return; }
  if (users.find(u => u.username === username)) { showToast('帳號已存在'); return; }
  users.push({ id: Date.now(), name, username, password, role });
  await cloudSet(STORAGE_KEY_USERS, users);
  closeM('mAddUser');
  showToast('✓ 帳號已建立');
  renderUList();
}

async function deleteUser(id) {
  if (!confirm('確定刪除此帳號？')) return;
  users = users.filter(u => u.id !== id);
  await cloudSet(STORAGE_KEY_USERS, users);
  renderUList();
  showToast('已刪除');
}

function exportData() {
  const blob = new Blob([JSON.stringify({ cases, users, customItems, exportedAt: new Date().toISOString() }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `祥安帳款備份_${new Date().toISOString().substring(0, 10)}.json`;
  a.click();
}

async function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.cases) { cases = d.cases; await cloudSet(STORAGE_KEY_CASES, cases); }
      if (d.users) { users = d.users; await cloudSet(STORAGE_KEY_USERS, users); }
      if (d.customItems) { customItems = d.customItems; await cloudSet(STORAGE_KEY_CUSTOM_ITEMS, customItems); }
      mergeCustomItems(); renderCases(); renderStats(); renderUList(); renderAdminItems();
      showToast('✓ 匯入成功・資料已連步');
    } catch (err) { showToast('❌ 格式錯誤'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function showPg(p) {
  document.querySelectorAll('.pg').forEach(el => el.classList.remove('on'));
  document.querySelectorAll('.nav button').forEach(el => el.classList.remove('on'));
  document.getElementById('pg-' + p).classList.add('on');
  const idx = { cases: 0, stats: 1, admin: 2 }[p];
  document.querySelectorAll('.nav button')[idx].classList.add('on');
  if (p === 'stats') renderStats();
  if (p === 'admin') { renderAdminItems(); if(CU && CU.role==='admin') renderUList(); }
}

function openM(id) { document.getElementById(id).classList.add('open'); }
function closeM(id) { document.getElementById(id).classList.remove('open'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  if(t) {
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
}

init();
</script>
</body>
</html>
