<html lang="zh-TW">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>祭品記帳</title>
<style>

  :root {
    --gold:#c9a84c; --gold-light:#e8c97a; --dark:#0e0c08; --dark2:#1a1710;
    --dark3:#252218; --dark4:#2e2a1e; --text:#f0e6cc; --text2:#a89870;
    --red:#c0392b; --green:#27ae60; --blue:#3a7bd5;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--dark);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;padding-bottom:80px;}

  .header{background:linear-gradient(180deg,#1a1308,var(--dark2));border-bottom:1px solid var(--gold);padding:16px 20px 12px;text-align:center;position:sticky;top:0;z-index:100;}
  .header h1{font-family:'Noto Serif TC',serif;font-size:20px;color:var(--gold);letter-spacing:4px;}
  .header p{font-size:11px;color:var(--text2);margin-top:2px;letter-spacing:2px;}

  .nav{display:flex;background:var(--dark2);border-bottom:1px solid #333;position:sticky;top:65px;z-index:99;}
  .nav button{flex:1;padding:12px 4px;background:none;border:none;color:var(--text2);font-size:13px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
  .nav button.active{color:var(--gold);border-bottom-color:var(--gold);}

  .page{display:none;padding:16px;}
  .page.active{display:block;}

  .card{background:var(--dark3);border:1px solid #333;border-radius:12px;padding:16px;margin-bottom:12px;}
  .card-title{font-family:'Noto Serif TC',serif;font-size:13px;color:var(--gold);letter-spacing:2px;margin-bottom:12px;}

  label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;margin-top:12px;}
  label:first-child{margin-top:0;}
  select,input[type="text"],input[type="number"],input[type="date"]{
    width:100%;background:var(--dark4);border:1px solid #444;border-radius:8px;
    color:var(--text);font-size:14px;font-family:'Noto Sans TC',sans-serif;
    padding:10px 12px;outline:none;-webkit-appearance:none;
  }
  select:focus,input:focus{border-color:var(--gold);}
  option{background:var(--dark3);}

  /* 廠商顏色標籤 */
  .vendor-chip{display:inline-block;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:500;}
  .v-明得堂{background:#1a2a3a;color:#6aaddd;}
  .v-無名祭品{background:#2a1a1a;color:#dd6a6a;}
  .v-烹廚祭品{background:#1a2a1a;color:#6add6a;}
  .v-法事{background:#2a1a2a;color:#cc88dd;}
  .v-今榮租車{background:#2a2010;color:#ddbb44;}

  /* 品項搜尋 */
  .item-search{position:relative;margin-bottom:8px;}
  .item-search input{padding-left:32px;}
  .item-search::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;}

  .item-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:300px;overflow-y:auto;padding:4px 0;}
  .item-btn{background:var(--dark4);border:1px solid #444;border-radius:8px;color:var(--text);padding:8px 8px;font-size:12px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;text-align:left;transition:all .15s;line-height:1.5;}
  .item-btn .iname{display:block;}
  .item-btn .iprice{display:block;color:var(--gold);font-size:11px;}
  .item-btn.selected{background:#2a2010;border-color:var(--gold);}

  .selected-items{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .selected-tag{background:#2a2010;border:1px solid var(--gold);border-radius:20px;padding:5px 10px;font-size:12px;color:var(--gold-light);display:flex;align-items:center;gap:6px;}
  .selected-tag button{background:none;border:none;color:var(--red);font-size:14px;cursor:pointer;padding:0;line-height:1;}

  .qty-row{display:flex;align-items:center;gap:6px;margin-top:6px;}
  .qty-row label{margin:0;width:auto;flex-shrink:0;}
  .qty-row input{width:60px;text-align:center;}

  .row{display:flex;gap:8px;}
  .row>div{flex:1;}

  .btn-primary{width:100%;background:linear-gradient(135deg,#8b6914,var(--gold));border:none;border-radius:10px;color:#1a1208;font-size:15px;font-weight:700;font-family:'Noto Sans TC',sans-serif;padding:14px;cursor:pointer;letter-spacing:2px;margin-top:16px;}
  .btn-secondary{width:100%;background:none;border:1px solid #555;border-radius:10px;color:var(--text2);font-size:14px;font-family:'Noto Sans TC',sans-serif;padding:10px;cursor:pointer;margin-top:8px;}

  /* 帳款卡 */
  .record-item{background:var(--dark3);border:1px solid #333;border-radius:10px;padding:14px;margin-bottom:8px;}
  .record-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
  .record-name{font-family:'Noto Serif TC',serif;font-size:15px;color:var(--gold);}
  .record-amount{font-size:16px;font-weight:600;color:var(--text);}
  .record-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
  .tag{background:var(--dark4);border-radius:4px;padding:2px 8px;font-size:11px;color:var(--text2);}
  .record-items-list{font-size:12px;color:var(--text2);line-height:2;}
  .record-actions{display:flex;gap:8px;margin-top:10px;}
  .btn-del{flex:1;background:none;border:1px solid #c0392b44;border-radius:6px;color:var(--red);font-size:12px;font-family:'Noto Sans TC',sans-serif;padding:6px;cursor:pointer;}
  .btn-paid{flex:2;background:none;border:1px solid #27ae6044;border-radius:6px;color:var(--green);font-size:12px;font-family:'Noto Sans TC',sans-serif;padding:6px;cursor:pointer;}
  .btn-paid.is-paid{background:#27ae6022;}
  .paid-badge{display:inline-block;background:#27ae6033;color:var(--green);border-radius:4px;padding:1px 6px;font-size:10px;margin-left:6px;}
  .unpaid-badge{display:inline-block;background:#c0392b22;color:var(--red);border-radius:4px;padding:1px 6px;font-size:10px;margin-left:6px;}

  /* 統計 */
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
  .stat-box{background:var(--dark3);border:1px solid #333;border-radius:10px;padding:14px;text-align:center;}
  .stat-num{font-size:22px;font-weight:600;color:var(--gold);}
  .stat-label{font-size:11px;color:var(--text2);margin-top:4px;}
  .vendor-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #2a2a22;}
  .vendor-row:last-child{border-bottom:none;}
  .vendor-name{font-size:14px;}
  .vendor-amount{font-size:14px;color:var(--gold);font-weight:500;}
  .vendor-sub{font-size:11px;color:var(--text2);margin-top:2px;}

  /* 篩選 */
  .filter-row{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;}
  .filter-btn{background:var(--dark3);border:1px solid #444;border-radius:20px;color:var(--text2);font-size:12px;font-family:'Noto Sans TC',sans-serif;padding:6px 14px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
  .filter-btn.active{background:#2a2010;border-color:var(--gold);color:var(--gold);}

  .empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px;}
  .empty .icon{font-size:40px;margin-bottom:12px;}

  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gold);color:#1a1208;border-radius:20px;padding:10px 20px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .divider{height:1px;background:#2a2a22;margin:12px 0;}
  .custom-row{display:flex;gap:8px;align-items:flex-end;}
  .custom-row>div:first-child{flex:2;}
  .custom-row>div:last-child{flex:1;}

  .no-items-msg{text-align:center;color:var(--text2);font-size:12px;padding:16px 0;}

  /* 案名輸入列表 */
  .case-suggestions{background:var(--dark4);border:1px solid #555;border-radius:8px;margin-top:4px;overflow:hidden;display:none;}
  .case-suggestion-item{padding:10px 12px;font-size:14px;cursor:pointer;border-bottom:1px solid #333;}
  .case-suggestion-item:last-child{border-bottom:none;}
  .case-suggestion-item:active{background:var(--dark3);}
</style>
</head>
<body>

<div class="header">
  <h1>祭品記帳</h1>
  <p>案件帳款管理系統</p>
</div>

<div class="nav">
  <button class="active" onclick="showPage('add')">＋ 新增</button>
  <button onclick="showPage('records')">📋 帳款</button>
  <button onclick="showPage('stats')">📊 統計</button>
</div>

<!-- 新增 -->
<div id="page-add" class="page active">
  <div class="card">
    <div class="card-title">🏮 案件資訊</div>
    <label>廠商</label>
    <select id="vendor" onchange="onVendorChange()">
      <option value="">選擇廠商</option>
      <option>明得堂</option>
      <option>無名祭品</option>
      <option>烹廚祭品</option>
      <option>法事</option>
      <option>今榮租車</option>
    </select>
    <label>案名（亡者姓名）</label>
    <input type="text" id="caseName" placeholder="例：陳○○" oninput="showCaseSuggestions()" onblur="hideSuggestions()">
    <div class="case-suggestions" id="caseSuggestions"></div>
    <label>日期</label>
    <input type="date" id="caseDate">
  </div>

  <div class="card" id="itemCard">
    <div class="card-title">🛒 選擇品項</div>
    <div id="vendorHint" class="no-items-msg">請先選擇廠商</div>
    <div id="itemSection" style="display:none">
      <div class="item-search"><input type="text" id="itemSearch" placeholder="搜尋品項..." oninput="renderItemGrid()"></div>
      <div class="item-grid" id="itemGrid"></div>
      <div class="divider"></div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:8px;">自訂品項</div>
      <div class="custom-row">
        <div><input type="text" id="customName" placeholder="品項名稱"></div>
        <div><input type="number" id="customPrice" placeholder="單價"></div>
      </div>
      <button class="btn-secondary" onclick="addCustomItem()">＋ 加入自訂品項</button>
    </div>
    <div id="selectedDisplay"></div>
  </div>

  <div class="card">
    <div class="card-title">💰 金額</div>
    <label>總計（元）</label>
    <input type="number" id="totalAmount" placeholder="自動計算，或手動輸入">
    <label>備註</label>
    <input type="text" id="note" placeholder="選填">
  </div>

  <button class="btn-primary" onclick="saveRecord()">✦ 儲存記錄</button>
</div>

<!-- 帳款 -->
<div id="page-records" class="page">
  <div style="display:flex;gap:8px;margin-bottom:10px;">
    <select id="filterVendor" onchange="renderRecords()" style="flex:1">
      <option value="">全部廠商</option>
      <option>明得堂</option>
      <option>無名祭品</option>
      <option>烹廚祭品</option>
      <option>法事</option>
      <option>今榮租車</option>
    </select>
    <select id="filterPaid" onchange="renderRecords()" style="flex:1">
      <option value="">全部狀態</option>
      <option value="0">未收款</option>
      <option value="1">已收款</option>
    </select>
  </div>
  <div class="filter-row" id="monthFilter"></div>
  <div id="recordList"></div>
</div>

<!-- 統計 -->
<div id="page-stats" class="page">
  <div class="stat-grid" id="statGrid"></div>
  <div class="card">
    <div class="card-title">🏢 廠商未收款</div>
    <div id="vendorStats"></div>
  </div>
  <div class="card">
    <div class="card-title">📅 月份統計</div>
    <div id="monthStats"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

    {name:'做功德(二日)', unit:'場', price:0},
    {name:'燒庫錢(大)', unit:'場', price:0},
    {name:'燒庫錢(小)', unit:'場', price:0},
    {name:'誦經(一堂)', unit:'堂', price:0},
    {name:'普渡法事', unit:'場', price:0},
    {name:'超渡牌位', unit:'份', price:0},
    {name:'開光點眼', unit:'次', price:0},
    {name:'安神位', unit:'次', price:0},
    {name:'擇日服務', unit:'次', price:0},
  ],
  '今榮租車': [
    {name:'靈車(一般)', unit:'趟', price:0},
    {name:'靈車(長程)', unit:'趟', price:0},
    {name:'禮車(家屬)', unit:'輛', price:0},
    {name:'遊覽車', unit:'輛', price:0},
    {name:'冷凍車', unit:'天', price:0},
    {name:'停車費', unit:'次', price:0},
    {name:'高速公路過路費', unit:'次', price:0},
  ],
};

// ═══════════════════════════════════════════
// 狀態
// ═══════════════════════════════════════════
let selectedItems = [];
let records = [];
let currentMonth = 'all';

function loadData(){ try{records=JSON.parse(localStorage.getItem('jipin_v2')||'[]');}catch(e){records=[];} }
function saveData(){ localStorage.setItem('jipin_v2',JSON.stringify(records)); }

function init(){
  loadData();
  const today = new Date();
  document.getElementById('caseDate').value = today.toISOString().split('T')[0];
  renderRecords();
  renderStats();
}

// ═══════════════════════════════════════════
// 廠商切換
// ═══════════════════════════════════════════
function onVendorChange(){
  selectedItems = [];
  const v = document.getElementById('vendor').value;
  document.getElementById('itemSearch').value = '';
  if(!v){
    document.getElementById('vendorHint').style.display='block';
    document.getElementById('itemSection').style.display='none';
  } else {
    document.getElementById('vendorHint').style.display='none';
    document.getElementById('itemSection').style.display='block';
  }
  renderItemGrid();
  renderSelectedDisplay();
  recalcTotal();
}

// ═══════════════════════════════════════════
// 品項格
// ═══════════════════════════════════════════
function renderItemGrid(){
  const v = document.getElementById('vendor').value;
  if(!v) return;
  const q = document.getElementById('itemSearch').value.toLowerCase();
  const items = (VENDOR_ITEMS[v]||[]).filter(it => !q || it.name.toLowerCase().includes(q));
  const grid = document.getElementById('itemGrid');
  if(items.length===0){ grid.innerHTML='<div class="no-items-msg" style="grid-column:1/-1">找不到品項</div>'; return; }
  grid.innerHTML = items.map((it,i)=>{
    const globalIdx = (VENDOR_ITEMS[v]||[]).indexOf(it);
    const sel = selectedItems.find(s=>s.name===it.name&&!s.custom);
    return `<button class="item-btn ${sel?'selected':''}" onclick="toggleItem(${globalIdx})">
      <span class="iname">${it.name}</span>
      <span class="iprice">${it.unit}${it.price>0?' $'+it.price:' (另計)'}</span>
    </button>`;
  }).join('');
}

function toggleItem(i){
  const v = document.getElementById('vendor').value;
  const it = (VENDOR_ITEMS[v]||[])[i];
  if(!it) return;
  const exists = selectedItems.findIndex(s=>s.name===it.name&&!s.custom);
  if(exists>=0){ selectedItems.splice(exists,1); }
  else { selectedItems.push({name:it.name, price:it.price, qty:1, unit:it.unit, custom:false}); }
  renderItemGrid();
  renderSelectedDisplay();
  recalcTotal();
}

function addCustomItem(){
  const name = document.getElementById('customName').value.trim();
  const price = parseInt(document.getElementById('customPrice').value)||0;
  if(!name){showToast('請輸入品項名稱');return;}
  selectedItems.push({name, price, qty:1, unit:'', custom:true});
  document.getElementById('customName').value='';
  document.getElementById('customPrice').value='';
  renderSelectedDisplay();
  recalcTotal();
}

function removeSelected(idx){
  const item = selectedItems[idx];
  selectedItems.splice(idx,1);
  if(!item.custom) renderItemGrid();
  renderSelectedDisplay();
  recalcTotal();
}

function changeQty(idx, val){
  selectedItems[idx].qty = Math.max(1, parseInt(val)||1);
  recalcTotal();
}

function renderSelectedDisplay(){
  const div = document.getElementById('selectedDisplay');
  if(selectedItems.length===0){div.innerHTML='';return;}
  div.innerHTML=`<div class="divider"></div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:8px;">已選 ${selectedItems.length} 項</div>
    ${selectedItems.map((s,i)=>`
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;background:var(--dark4);border-radius:8px;padding:8px 10px;">
        <div style="flex:1;font-size:13px;">${s.name}${s.price>0?' · $'+s.price:''}</div>
        <div style="display:flex;align-items:center;gap:4px;">
          <span style="font-size:12px;color:var(--text2);">數量</span>
          <input type="number" value="${s.qty}" min="1" style="width:50px;text-align:center;font-size:13px;" oninput="changeQty(${i},this.value)">
        </div>
        <button onclick="removeSelected(${i})" style="background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:0 4px;">✕</button>
      </div>
    `).join('')}`;
}

function recalcTotal(){
  const total = selectedItems.reduce((s,it)=>s+(it.price*it.qty),0);
  if(total>0) document.getElementById('totalAmount').value=total;
  else document.getElementById('totalAmount').value='';
}

// ═══════════════════════════════════════════
// 儲存
// ═══════════════════════════════════════════
function saveRecord(){
  const vendor = document.getElementById('vendor').value;
  const caseName = document.getElementById('caseName').value.trim();
  const date = document.getElementById('caseDate').value;
  const totalInput = parseInt(document.getElementById('totalAmount').value)||0;
  const note = document.getElementById('note').value.trim();

  if(!vendor){showToast('請選擇廠商');return;}
  if(!caseName){showToast('請輸入案名');return;}
  if(selectedItems.length===0&&totalInput===0){showToast('請選擇品項或輸入金額');return;}

  const total = totalInput || selectedItems.reduce((s,it)=>s+it.price*it.qty,0);
  const month = date.substring(0,7);

  records.unshift({
    id:Date.now(), vendor, caseName, date, total, note,
    items:[...selectedItems], month, paid:false, createdAt:new Date().toISOString()
  });
  saveData();
  showToast('✓ 已儲存！');
  resetForm();
  renderStats();
}

function resetForm(){
  document.getElementById('vendor').value='';
  document.getElementById('caseName').value='';
  document.getElementById('totalAmount').value='';
  document.getElementById('note').value='';
  document.getElementById('customName').value='';
  document.getElementById('customPrice').value='';
  const today=new Date();
  document.getElementById('caseDate').value=today.toISOString().split('T')[0];
  selectedItems=[];
  document.getElementById('vendorHint').style.display='block';
  document.getElementById('itemSection').style.display='none';
  document.getElementById('selectedDisplay').innerHTML='';
  document.getElementById('itemGrid').innerHTML='';
}

// ═══════════════════════════════════════════
// 案名自動完成
// ═══════════════════════════════════════════
function showCaseSuggestions(){
  const q = document.getElementById('caseName').value.trim();
  if(!q){hideSuggestions();return;}
  const names=[...new Set(records.map(r=>r.caseName))].filter(n=>n.includes(q)&&n!==q);
  const box=document.getElementById('caseSuggestions');
  if(names.length===0){box.style.display='none';return;}
  box.style.display='block';
  box.innerHTML=names.slice(0,5).map(n=>`<div class="case-suggestion-item" onmousedown="selectCase('${n}')">${n}</div>`).join('');
}
function selectCase(n){document.getElementById('caseName').value=n;hideSuggestions();}
function hideSuggestions(){setTimeout(()=>document.getElementById('caseSuggestions').style.display='none',150);}

// ═══════════════════════════════════════════
// 帳款列表
// ═══════════════════════════════════════════
function renderRecords(){
  const months=[...new Set(records.map(r=>r.month))].sort().reverse();
  const mf=document.getElementById('monthFilter');
  mf.innerHTML=`<button class="filter-btn ${currentMonth==='all'?'active':''}" onclick="setMonth('all')">全部</button>`
    +months.map(m=>`<button class="filter-btn ${currentMonth===m?'active':''}" onclick="setMonth('${m}')">${m.replace('-','年')}月</button>`).join('');

  const fv=document.getElementById('filterVendor').value;
  const fp=document.getElementById('filterPaid').value;
  let filtered=records;
  if(currentMonth!=='all') filtered=filtered.filter(r=>r.month===currentMonth);
  if(fv) filtered=filtered.filter(r=>r.vendor===fv);
  if(fp!=='') filtered=filtered.filter(r=>r.paid===(fp==='1'));

  const list=document.getElementById('recordList');
  if(filtered.length===0){list.innerHTML=`<div class="empty"><div class="icon">🕯️</div>尚無記錄</div>`;return;}

  // 月份小計
  const subtotal=filtered.reduce((s,r)=>s+r.total,0);
  const unpaidSub=filtered.filter(r=>!r.paid).reduce((s,r)=>s+r.total,0);
  list.innerHTML=`<div style="display:flex;justify-content:space-between;padding:8px 4px;margin-bottom:8px;border-bottom:1px solid #333;font-size:13px;">
    <span style="color:var(--text2)">共 ${filtered.length} 筆</span>
    <span>未收 <strong style="color:var(--red)">$${unpaidSub.toLocaleString()}</strong> / 合計 $${subtotal.toLocaleString()}</span>
  </div>`
  + filtered.map(r=>`
    <div class="record-item">
      <div class="record-header">
        <div>
          <div class="record-name">
            ${r.caseName}
            ${r.paid?'<span class="paid-badge">已收款</span>':'<span class="unpaid-badge">未收款</span>'}
          </div>
          <div class="record-meta">
            <span class="vendor-chip v-${r.vendor}">${r.vendor}</span>
            <span class="tag">${r.date}</span>
            ${r.note?`<span class="tag">${r.note}</span>`:''}
          </div>
        </div>
        <div class="record-amount">$${r.total.toLocaleString()}</div>
      </div>
      ${r.items&&r.items.length>0?`<div class="record-items-list">${r.items.map(it=>`${it.name}×${it.qty}${it.price>0?' $'+(it.price*it.qty):''}`).join('　')}</div>`:''}
      <div class="record-actions">
        <button class="btn-del" onclick="deleteRecord(${r.id})">🗑 刪除</button>
        <button class="btn-paid ${r.paid?'is-paid':''}" onclick="togglePaid(${r.id})">${r.paid?'✓ 已收款':'標記已收款'}</button>
      </div>
    </div>
  `).join('');
}

function setMonth(m){currentMonth=m;renderRecords();}

function deleteRecord(id){
  if(!confirm('確定刪除這筆記錄？'))return;
  records=records.filter(r=>r.id!==id);
  saveData();renderRecords();renderStats();
}
function togglePaid(id){
  const r=records.find(r=>r.id===id);
  if(r){r.paid=!r.paid;saveData();renderRecords();renderStats();}
}

// ═══════════════════════════════════════════
// 統計
// ═══════════════════════════════════════════
function renderStats(){
  const total=records.reduce((s,r)=>s+r.total,0);
  const unpaid=records.filter(r=>!r.paid).reduce((s,r)=>s+r.total,0);
  const paid=total-unpaid;
  document.getElementById('statGrid').innerHTML=`
    <div class="stat-box"><div class="stat-num">$${total.toLocaleString()}</div><div class="stat-label">總金額</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--red)">$${unpaid.toLocaleString()}</div><div class="stat-label">未收款</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--green)">$${paid.toLocaleString()}</div><div class="stat-label">已收款</div></div>
    <div class="stat-box"><div class="stat-num">${records.length}</div><div class="stat-label">總案件數</div></div>
  `;
  const vMap={};
  records.forEach(r=>{
    if(!vMap[r.vendor])vMap[r.vendor]={total:0,unpaid:0,count:0};
    vMap[r.vendor].total+=r.total;vMap[r.vendor].count++;
    if(!r.paid)vMap[r.vendor].unpaid+=r.total;
  });
  document.getElementById('vendorStats').innerHTML=Object.entries(vMap)
    .sort((a,b)=>b[1].unpaid-a[1].unpaid)
    .map(([name,v])=>`<div class="vendor-row">
      <div>
        <div class="vendor-name"><span class="vendor-chip v-${name}">${name}</span></div>
        <div class="vendor-sub">${v.count}筆　已收 $${(v.total-v.unpaid).toLocaleString()}</div>
      </div>
      <div style="text-align:right">
        <div class="vendor-amount">$${v.unpaid.toLocaleString()}</div>
        <div style="font-size:11px;color:var(--text2)">未收</div>
      </div>
    </div>`).join('')||'<div style="color:var(--text2);font-size:13px;padding:10px 0;">尚無資料</div>';

  const mMap={};
  records.forEach(r=>{
    const m=r.month||'未知';
    if(!mMap[m])mMap[m]={total:0,unpaid:0,count:0};
    mMap[m].total+=r.total;mMap[m].count++;
    if(!r.paid)mMap[m].unpaid+=r.total;
  });
  document.getElementById('monthStats').innerHTML=Object.entries(mMap)
    .sort((a,b)=>b[0].localeCompare(a[0]))
    .map(([m,v])=>`<div class="vendor-row">
      <div>
        <div class="vendor-name">${m.replace('-','年')}月</div>
        <div class="vendor-sub">${v.count}筆　未收 $${v.unpaid.toLocaleString()}</div>
      </div>
      <div class="vendor-amount">$${v.total.toLocaleString()}</div>
    </div>`).join('')||'<div style="color:var(--text2);font-size:13px;padding:10px 0;">尚無資料</div>';
}

// ═══════════════════════════════════════════
// 工具
// ═══════════════════════════════════════════
function showPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('.nav button')[{add:0,records:1,stats:2}[p]].classList.add('active');
  if(p==='records')renderRecords();
  if(p==='stats')renderStats();
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

init();
</script>
</body>
</html>
