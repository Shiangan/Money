<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>葬儀帳款系統</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap');
:root{
  --gold:#c9a84c;--gold-light:#e8c97a;--gold-dim:#7a6030;
  --dark:#0d0b08;--dark2:#181510;--dark3:#211e14;--dark4:#2a261a;--dark5:#332e20;
  --text:#f0e6cc;--text2:#9a8a68;--text3:#5a5040;
  --red:#c0392b;--green:#27ae60;--blue:#2980b9;--purple:#8e44ad;--orange:#d35400;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--dark);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;padding-bottom:80px;}

/* ── HEADER ── */
.header{background:linear-gradient(180deg,#100e08,var(--dark2));border-bottom:1px solid var(--gold-dim);padding:14px 16px 10px;position:sticky;top:0;z-index:200;}
.header-top{display:flex;align-items:center;justify-content:space-between;}
.header h1{font-family:'Noto Serif TC',serif;font-size:18px;color:var(--gold);letter-spacing:3px;}
.header-sub{font-size:11px;color:var(--text2);letter-spacing:2px;margin-top:2px;}

/* ── NAV ── */
.nav{display:flex;background:var(--dark2);border-bottom:1px solid #2a2518;position:sticky;top:56px;z-index:199;}
.nav button{flex:1;padding:11px 2px;background:none;border:none;color:var(--text2);font-size:12px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:1px;}
.nav button.active{color:var(--gold);border-bottom-color:var(--gold);}

/* ── PAGES ── */
.page{display:none;padding:14px;}
.page.active{display:block;}

/* ── CARDS ── */
.card{background:var(--dark3);border:1px solid #2a2518;border-radius:12px;padding:15px;margin-bottom:10px;}
.card-title{font-family:'Noto Serif TC',serif;font-size:13px;color:var(--gold);letter-spacing:2px;margin-bottom:13px;display:flex;align-items:center;gap:6px;}

/* ── FORM ELEMENTS ── */
label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;margin-top:11px;letter-spacing:1px;}
label:first-child{margin-top:0;}
select,input[type="text"],input[type="number"],input[type="date"],textarea{
  width:100%;background:var(--dark4);border:1px solid #3a3425;border-radius:8px;
  color:var(--text);font-size:14px;font-family:'Noto Sans TC',sans-serif;
  padding:10px 12px;outline:none;-webkit-appearance:none;appearance:none;
}
select:focus,input:focus,textarea:focus{border-color:var(--gold-dim);}
option{background:var(--dark3);}
textarea{resize:none;height:70px;line-height:1.6;}

/* ── BUTTONS ── */
.btn-gold{width:100%;background:linear-gradient(135deg,#7a5a10,var(--gold));border:none;border-radius:10px;color:#1a1208;font-size:15px;font-weight:700;font-family:'Noto Sans TC',sans-serif;padding:13px;cursor:pointer;letter-spacing:2px;margin-top:14px;}
.btn-ghost{background:none;border:1px solid #3a3425;border-radius:8px;color:var(--text2);font-size:13px;font-family:'Noto Sans TC',sans-serif;padding:8px 14px;cursor:pointer;}
.btn-sm{background:none;border:1px solid #3a3425;border-radius:6px;color:var(--text2);font-size:12px;font-family:'Noto Sans TC',sans-serif;padding:5px 10px;cursor:pointer;}
.btn-sm.danger{border-color:#c0392b44;color:var(--red);}
.btn-sm.success{border-color:#27ae6044;color:var(--green);}
.btn-sm.primary{border-color:var(--gold-dim);color:var(--gold);}

/* ── VENDOR CHIPS ── */
.chip{display:inline-block;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:500;white-space:nowrap;}
.chip-明得堂{background:#0e1e2e;color:#5aaae0;}
.chip-無名祭品{background:#2a0e0e;color:#e07070;}
.chip-烹廚祭品{background:#0e2a0e;color:#70e070;}
.chip-法事{background:#1e0e2a;color:#c070e0;}
.chip-今榮租車{background:#2a1e0e;color:#e0b050;}

/* ── CASE LIST ── */
.case-card{background:var(--dark3);border:1px solid #2a2518;border-radius:12px;margin-bottom:10px;overflow:hidden;cursor:pointer;transition:border-color .2s;}
.case-card:active{border-color:var(--gold-dim);}
.case-header{padding:14px 15px;display:flex;justify-content:space-between;align-items:center;}
.case-name{font-family:'Noto Serif TC',serif;font-size:16px;color:var(--gold);}
.case-meta{font-size:11px;color:var(--text2);margin-top:3px;}
.case-total{text-align:right;}
.case-total-num{font-size:17px;font-weight:600;color:var(--text);}
.case-total-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.case-chips{display:flex;gap:5px;flex-wrap:wrap;padding:0 15px 12px;}
.case-expand{background:var(--dark4);border-top:1px solid #2a2518;padding:14px 15px;display:none;}
.case-expand.open{display:block;}

/* 廠商區塊 */
.vendor-block{margin-bottom:12px;}
.vendor-block-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.vendor-block-items{background:var(--dark5);border-radius:8px;padding:10px 12px;}
.item-line{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #2a2518;font-size:13px;}
.item-line:last-child{border-bottom:none;}
.item-line-name{color:var(--text);flex:1;}
.item-line-detail{color:var(--text2);font-size:12px;margin-left:8px;}
.item-line-price{color:var(--gold);font-weight:500;margin-left:8px;}
.vendor-subtotal{display:flex;justify-content:flex-end;margin-top:6px;font-size:13px;color:var(--text2);}
.vendor-subtotal strong{color:var(--text);margin-left:6px;}

.note-line{font-size:12px;color:var(--text2);margin-top:6px;font-style:italic;}

.action-row{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid #2a2518;}

/* ── ITEM PICKER ── */
.item-picker-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.item-search input{padding-left:34px;}
.item-search{position:relative;margin-bottom:8px;}
.item-search::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;}
.item-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;max-height:250px;overflow-y:auto;}
.item-btn{background:var(--dark4);border:1px solid #3a3425;border-radius:8px;color:var(--text);padding:8px;font-size:12px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;text-align:left;line-height:1.5;transition:all .15s;}
.item-btn.sel{background:#2a2010;border-color:var(--gold-dim);}
.item-btn .iname{display:block;font-size:12px;}
.item-btn .iprice{display:block;color:var(--gold);font-size:11px;}

.selected-block{margin-top:10px;}
.sel-item-row{display:flex;align-items:center;gap:8px;background:var(--dark4);border-radius:8px;padding:8px 10px;margin-bottom:5px;}
.sel-item-name{flex:1;font-size:13px;}
.sel-item-qty{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);}
.sel-item-qty input{width:48px;text-align:center;font-size:13px;padding:4px 6px;}
.sel-item-price{font-size:13px;color:var(--gold);min-width:55px;text-align:right;}
.sel-remove{background:none;border:none;color:var(--red);font-size:16px;cursor:pointer;padding:0 2px;}

/* ── STATS ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.stat-box{background:var(--dark3);border:1px solid #2a2518;border-radius:10px;padding:13px;text-align:center;}
.stat-num{font-size:20px;font-weight:600;color:var(--gold);}
.stat-label{font-size:11px;color:var(--text2);margin-top:3px;}

.summary-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #2a2518;font-size:14px;}
.summary-row:last-child{border-bottom:none;}
.summary-name{color:var(--text);}
.summary-right{text-align:right;}
.summary-amount{color:var(--gold);font-weight:500;}
.summary-sub{font-size:11px;color:var(--text2);margin-top:2px;}

/* ── FILTERS ── */
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;}
.filter-btn{background:var(--dark3);border:1px solid #3a3425;border-radius:18px;color:var(--text2);font-size:12px;font-family:'Noto Sans TC',sans-serif;padding:5px 13px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.filter-btn.active{background:#2a2010;border-color:var(--gold-dim);color:var(--gold);}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:#000000bb;z-index:500;display:none;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:var(--dark2);border-radius:16px 16px 0 0;border-top:1px solid var(--gold-dim);padding:20px 16px;width:100%;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'Noto Serif TC',serif;font-size:16px;color:var(--gold);letter-spacing:2px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
.modal-close{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:0;}

/* ── MISC ── */
.divider{height:1px;background:#2a2518;margin:12px 0;}
.empty{text-align:center;padding:40px 16px;color:var(--text2);font-size:14px;}
.empty .icon{font-size:36px;margin-bottom:10px;}
.badge-paid{display:inline-block;background:#27ae6022;color:var(--green);border-radius:4px;padding:1px 7px;font-size:10px;}
.badge-unpaid{display:inline-block;background:#c0392b22;color:var(--red);border-radius:4px;padding:1px 7px;font-size:10px;}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--gold);color:#1a1208;border-radius:20px;padding:9px 20px;font-size:13px;font-weight:600;opacity:0;transition:all .25s;z-index:999;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.row2{display:flex;gap:8px;}
.row2>div{flex:1;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>葬儀帳款</h1>
      <div class="header-sub">案件整合管理系統</div>
    </div>
    <button class="btn-ghost" onclick="openNewCase()">＋ 新案</button>
  </div>
</div>

<div class="nav">
  <button class="active" onclick="showPage('cases')">📋 案件</button>
  <button onclick="showPage('stats')">📊 統計</button>
</div>

<!-- ════════════ 案件頁 ════════════ -->
<div id="page-cases" class="page active">
  <div style="display:flex;gap:8px;margin-bottom:10px;">
    <input type="text" id="searchCase" placeholder="🔍 搜尋亡者姓名..." oninput="renderCases()" style="flex:1;">
    <select id="filterStatus" onchange="renderCases()" style="width:90px;">
      <option value="">全部</option>
      <option value="0">未結清</option>
      <option value="1">已結清</option>
    </select>
  </div>
  <div class="filter-row" id="caseMonthFilter"></div>
  <div id="caseList"></div>
</div>

<!-- ════════════ 統計頁 ════════════ -->
<div id="page-stats" class="page">
  <div class="filter-row" id="statsMonthFilter"></div>
  <div class="stat-grid" id="statGrid"></div>

  <div class="card">
    <div class="card-title">🏢 廠商統計</div>
    <div id="vendorStats"></div>
  </div>
  <div class="card">
    <div class="card-title">📅 月份統計</div>
    <div id="monthStats"></div>
  </div>
</div>

<!-- ════════════ 新增案件 Modal ════════════ -->
<div class="modal-overlay" id="modalNewCase">
  <div class="modal">
    <div class="modal-title">新增案件 <button class="modal-close" onclick="closeModal('modalNewCase')">✕</button></div>
    <label>亡者姓名</label>
    <input type="text" id="nc-name" placeholder="例：陳呂玉麵">
    <div class="row2">
      <div><label>往生日期</label><input type="date" id="nc-date"></div>
      <div><label>月份（帳款）</label><input type="month" id="nc-month"></div>
    </div>
    <label>備註</label>
    <input type="text" id="nc-note" placeholder="選填，例：台北市某某殯儀館">
    <button class="btn-gold" onclick="saveNewCase()">建立案件</button>
  </div>
</div>

<!-- ════════════ 新增費用 Modal ════════════ -->
<div class="modal-overlay" id="modalAddExpense">
  <div class="modal">
    <div class="modal-title" id="expModalTitle">新增費用 <button class="modal-close" onclick="closeModal('modalAddExpense')">✕</button></div>

    <label>廠商類別</label>
    <select id="exp-vendor" onchange="onExpVendorChange()">
      <option value="">選擇廠商</option>
      <option>明得堂</option>
      <option>無名祭品</option>
      <option>基隆烹廚祭品</option>
      <option>芃宸法事</option>
      <option>今榮租車</option>
    </select>

    <label>費用名稱／說明</label>
    <input type="text" id="exp-label" placeholder="例：頭七法事、三牲四果、靈車">

    <div id="exp-item-section" style="display:none;margin-top:12px;">
      <div class="card-title" style="font-size:12px;">從品項選擇</div>
      <div class="item-search"><input type="text" id="exp-search" placeholder="搜尋品項..." oninput="renderExpItems()"></div>
      <div class="item-grid" id="exp-item-grid"></div>
      <div class="selected-block" id="exp-selected-block"></div>
      <div class="divider"></div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:8px;">自訂品項</div>
      <div class="row2">
        <div><input type="text" id="exp-custom-name" placeholder="品項名稱"></div>
        <div><input type="number" id="exp-custom-price" placeholder="單價"></div>
      </div>
      <button class="btn-ghost" style="margin-top:6px;width:100%;" onclick="addExpCustomItem()">＋ 加入</button>
    </div>

    <div class="row2" style="margin-top:12px;">
      <div>
        <label>金額（元）</label>
        <input type="number" id="exp-amount" placeholder="0">
      </div>
      <div>
        <label>日期</label>
        <input type="date" id="exp-date">
      </div>
    </div>

    <label>備註</label>
    <input type="text" id="exp-note" placeholder="選填">

    <button class="btn-gold" onclick="saveExpense()">儲存費用</button>
  </div>
</div>

<div class="toast" id="toast"></div>

// ════════════════════════════════════════════
// 資料結構
// cases: [{id, name, date, month, note, paid, expenses:[{id,vendor,label,amount,date,note,items:[]}]}]
// ════════════════════════════════════════════
let cases = [];
let activeCaseId = null; // 正在新增費用的案件
let expSelectedItems = []; // 費用modal暫存品項
let statsMonth = 'all';
let caseMonth = 'all';

function loadData(){try{cases=JSON.parse(localStorage.getItem('jipin_cases')||'[]');}catch(e){cases=[];}}
function saveData(){localStorage.setItem('jipin_cases',JSON.stringify(cases));}

function init(){
  loadData();
  const t=new Date();
  document.getElementById('nc-date').value=t.toISOString().split('T')[0];
  document.getElementById('nc-month').value=t.toISOString().substring(0,7);
  document.getElementById('exp-date').value=t.toISOString().split('T')[0];
  renderCases();
  renderStats();
}

// ════════════════════════════════════════════
// 新增案件
// ════════════════════════════════════════════
function openNewCase(){
  const t=new Date();
  document.getElementById('nc-name').value='';
  document.getElementById('nc-note').value='';
  document.getElementById('nc-date').value=t.toISOString().split('T')[0];
  document.getElementById('nc-month').value=t.toISOString().substring(0,7);
  openModal('modalNewCase');
}

function saveNewCase(){
  const name=document.getElementById('nc-name').value.trim();
  if(!name){showToast('請輸入亡者姓名');return;}
  const c={
    id:Date.now(),
    name,
    date:document.getElementById('nc-date').value,
    month:document.getElementById('nc-month').value,
    note:document.getElementById('nc-note').value.trim(),
    paid:false,
    expenses:[]
  };
  cases.unshift(c);
  saveData();
  closeModal('modalNewCase');
  showToast('✓ 案件已建立');
  renderCases();
  renderStats();
}

// ════════════════════════════════════════════
// 新增費用
// ════════════════════════════════════════════
function openAddExpense(caseId){
  activeCaseId=caseId;
  expSelectedItems=[];
  const c=cases.find(x=>x.id===caseId);
  document.getElementById('expModalTitle').innerHTML=`<span style="color:var(--gold-light);font-size:14px;">${c.name}</span> 新增費用 <button class="modal-close" onclick="closeModal('modalAddExpense')">✕</button>`;
  document.getElementById('exp-vendor').value='';
  document.getElementById('exp-label').value='';
  document.getElementById('exp-amount').value='';
  document.getElementById('exp-note').value='';
  document.getElementById('exp-search').value='';
  document.getElementById('exp-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('exp-item-section').style.display='none';
  document.getElementById('exp-item-grid').innerHTML='';
  document.getElementById('exp-selected-block').innerHTML='';
  document.getElementById('exp-custom-name').value='';
  document.getElementById('exp-custom-price').value='';
  openModal('modalAddExpense');
}

function onExpVendorChange(){
  expSelectedItems=[];
  const v=document.getElementById('exp-vendor').value;
  document.getElementById('exp-search').value='';
  if(v&&VENDOR_ITEMS[v]){
    document.getElementById('exp-item-section').style.display='block';
    renderExpItems();
  } else {
    document.getElementById('exp-item-section').style.display='none';
  }
  renderExpSelected();
  recalcExp();
}

function renderExpItems(){
  const v=document.getElementById('exp-vendor').value;
  const q=document.getElementById('exp-search').value.toLowerCase();
  const items=(VENDOR_ITEMS[v]||[]).filter(it=>!q||it.n.includes(q));
  document.getElementById('exp-item-grid').innerHTML=items.map((it,idx)=>{
    const gi=(VENDOR_ITEMS[v]||[]).findIndex(x=>x.n===it.n);
    const sel=expSelectedItems.find(s=>s.name===it.n);
    return `<button class="item-btn ${sel?'sel':''}" onclick="toggleExpItem(${gi})">
      <span class="iname">${it.n}</span>
      <span class="iprice">${it.u}${it.p>0?' $'+it.p:' (另計)'}</span>
    </button>`;
  }).join('');
}

function toggleExpItem(i){
  const v=document.getElementById('exp-vendor').value;
  const it=(VENDOR_ITEMS[v]||[])[i];
  if(!it)return;
  const idx=expSelectedItems.findIndex(s=>s.name===it.n&&!s.custom);
  if(idx>=0)expSelectedItems.splice(idx,1);
  else expSelectedItems.push({name:it.n,price:it.p,qty:1,unit:it.u,custom:false});
  renderExpItems();
  renderExpSelected();
  recalcExp();
}

function addExpCustomItem(){
  const name=document.getElementById('exp-custom-name').value.trim();
  const price=parseFloat(document.getElementById('exp-custom-price').value)||0;
  if(!name){showToast('請輸入品項名稱');return;}
  expSelectedItems.push({name,price,qty:1,unit:'',custom:true});
  document.getElementById('exp-custom-name').value='';
  document.getElementById('exp-custom-price').value='';
  renderExpSelected();
  recalcExp();
}

function removeExpItem(i){
  const it=expSelectedItems[i];
  expSelectedItems.splice(i,1);
  if(!it.custom)renderExpItems();
  renderExpSelected();
  recalcExp();
}

function changeExpQty(i,v){
  expSelectedItems[i].qty=Math.max(1,parseInt(v)||1);
  recalcExp();
}

function renderExpSelected(){
  const div=document.getElementById('exp-selected-block');
  if(expSelectedItems.length===0){div.innerHTML='';return;}
  div.innerHTML=`<div class="divider"></div>`+expSelectedItems.map((s,i)=>`
    <div class="sel-item-row">
      <span class="sel-item-name">${s.name}</span>
      <div class="sel-item-qty">
        <span>數量</span>
        <input type="number" value="${s.qty}" min="1" oninput="changeExpQty(${i},this.value)">
      </div>
      <span class="sel-item-price">${s.price>0?'$'+(s.price*s.qty):'-'}</span>
      <button class="sel-remove" onclick="removeExpItem(${i})">✕</button>
    </div>
  `).join('');
}

function recalcExp(){
  const total=expSelectedItems.reduce((s,it)=>s+(it.price*it.qty),0);
  if(total>0)document.getElementById('exp-amount').value=total;
}

function saveExpense(){
  if(!activeCaseId){return;}
  const vendor=document.getElementById('exp-vendor').value;
  const label=document.getElementById('exp-label').value.trim();
  const amount=parseFloat(document.getElementById('exp-amount').value)||0;
  const date=document.getElementById('exp-date').value;
  const note=document.getElementById('exp-note').value.trim();
  if(!vendor){showToast('請選擇廠商');return;}
  if(!label&&expSelectedItems.length===0){showToast('請輸入費用說明或選擇品項');return;}
  if(amount===0&&expSelectedItems.length===0){showToast('請輸入金額');return;}

  const c=cases.find(x=>x.id===activeCaseId);
  if(!c)return;
  c.expenses.push({
    id:Date.now(),vendor,
    label:label||(expSelectedItems.map(s=>s.name).join('、')),
    amount,date,note,
    items:[...expSelectedItems]
  });
  saveData();
  closeModal('modalAddExpense');
  showToast('✓ 費用已新增');
  renderCases();
  renderStats();
}

function deleteExpense(caseId,expId){
  const c=cases.find(x=>x.id===caseId);
  if(!c)return;
  c.expenses=c.expenses.filter(e=>e.id!==expId);
  saveData();renderCases();renderStats();
}

// ════════════════════════════════════════════
// 案件列表
// ════════════════════════════════════════════
function renderCases(){
  const months=[...new Set(cases.map(c=>c.month))].sort().reverse();
  const mf=document.getElementById('caseMonthFilter');
  mf.innerHTML=`<button class="filter-btn ${caseMonth==='all'?'active':''}" onclick="setCaseMonth('all')">全部</button>`
    +months.map(m=>`<button class="filter-btn ${caseMonth===m?'active':''}" onclick="setCaseMonth('${m}')">${m.replace('-','年')}月</button>`).join('');

  const q=document.getElementById('searchCase').value.trim();
  const fs=document.getElementById('filterStatus').value;
  let filtered=cases;
  if(caseMonth!=='all')filtered=filtered.filter(c=>c.month===caseMonth);
  if(q)filtered=filtered.filter(c=>c.name.includes(q));
  if(fs!=='')filtered=filtered.filter(c=>c.paid===(fs==='1'));

  const list=document.getElementById('caseList');
  if(filtered.length===0){list.innerHTML=`<div class="empty"><div class="icon">🕯️</div>尚無案件</div>`;return;}
  list.innerHTML=filtered.map(c=>renderCaseCard(c)).join('');
}

function setCaseMonth(m){caseMonth=m;renderCases();}

function renderCaseCard(c){
  const total=c.expenses.reduce((s,e)=>s+e.amount,0);
  const vendors=[...new Set(c.expenses.map(e=>e.vendor))];
  // 依廠商分組費用
  const vendorGroups={};
  c.expenses.forEach(e=>{
    if(!vendorGroups[e.vendor])vendorGroups[e.vendor]=[];
    vendorGroups[e.vendor].push(e);
  });

  const expandContent=Object.entries(vendorGroups).map(([vname,exps])=>{
    const vsub=exps.reduce((s,e)=>s+e.amount,0);
    return `<div class="vendor-block">
      <div class="vendor-block-header">
        <span class="chip chip-${vname}">${vname}</span>
        <span style="font-size:13px;color:var(--text2)">小計 <strong style="color:var(--text)">$${vsub.toLocaleString()}</strong></span>
      </div>
      <div class="vendor-block-items">
        ${exps.map(e=>`
          <div class="item-line">
            <div style="flex:1;">
              <div class="item-line-name">${e.label}</div>
              ${e.items&&e.items.length>0?`<div style="font-size:11px;color:var(--text2);margin-top:2px;">${e.items.map(it=>`${it.name}×${it.qty}`).join('　')}</div>`:''}
              ${e.note?`<div class="note-line">${e.note}</div>`:''}
              <div style="font-size:11px;color:var(--text3);margin-top:1px;">${e.date}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
              <span class="item-line-price">${e.amount>0?'$'+e.amount.toLocaleString():'-'}</span>
              <button class="btn-sm danger" onclick="event.stopPropagation();deleteExpense(${c.id},${e.id})">刪</button>
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;
  }).join('');

  return `<div class="case-card">
    <div onclick="toggleExpand(${c.id})">
      <div class="case-header">
        <div>
          <div class="case-name">${c.name} ${c.paid?'<span class="badge-paid">已結清</span>':'<span class="badge-unpaid">未結清</span>'}</div>
          <div class="case-meta">${c.date||''} ${c.note?'・'+c.note:''}</div>
        </div>
        <div class="case-total">
          <div class="case-total-num">$${total.toLocaleString()}</div>
          <div class="case-total-sub">${c.expenses.length}筆費用 ▾</div>
        </div>
      </div>
      <div class="case-chips">
        ${vendors.map(v=>`<span class="chip chip-${v}">${v}</span>`).join('')}
        ${vendors.length===0?'<span style="font-size:12px;color:var(--text3);">尚無費用</span>':''}
      </div>
    </div>
    <div class="case-expand" id="expand-${c.id}">
      ${expandContent||'<div style="color:var(--text2);font-size:13px;text-align:center;padding:10px 0;">尚無費用記錄</div>'}
      <div class="action-row">
        <button class="btn-sm primary" onclick="openAddExpense(${c.id})">＋ 新增費用</button>
        <button class="btn-sm success" onclick="toggleCasePaid(${c.id})">${c.paid?'取消結清':'標記已結清'}</button>
        <button class="btn-sm danger" onclick="deleteCase(${c.id})">刪除案件</button>
      </div>
    </div>
  </div>`;
}

function toggleExpand(id){
  const el=document.getElementById('expand-'+id);
  el.classList.toggle('open');
}

function toggleCasePaid(id){
  const c=cases.find(x=>x.id===id);
  if(c){c.paid=!c.paid;saveData();renderCases();renderStats();}
}

function deleteCase(id){
  if(!confirm('確定刪除此案件及所有費用？'))return;
  cases=cases.filter(c=>c.id!==id);
  saveData();renderCases();renderStats();
}

// ════════════════════════════════════════════
// 統計
// ════════════════════════════════════════════
function renderStats(){
  const months=[...new Set(cases.map(c=>c.month))].sort().reverse();
  const mf=document.getElementById('statsMonthFilter');
  mf.innerHTML=`<button class="filter-btn ${statsMonth==='all'?'active':''}" onclick="setStatsMonth('all')">全部</button>`
    +months.map(m=>`<button class="filter-btn ${statsMonth===m?'active':''}" onclick="setStatsMonth('${m}')">${m.replace('-','年')}月</button>`).join('');

  let filtered=statsMonth==='all'?cases:cases.filter(c=>c.month===statsMonth);
  const allExp=filtered.flatMap(c=>c.expenses);
  const total=allExp.reduce((s,e)=>s+e.amount,0);
  const unpaidTotal=filtered.filter(c=>!c.paid).flatMap(c=>c.expenses).reduce((s,e)=>s+e.amount,0);

  document.getElementById('statGrid').innerHTML=`
    <div class="stat-box"><div class="stat-num">$${total.toLocaleString()}</div><div class="stat-label">總金額</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--red)">$${unpaidTotal.toLocaleString()}</div><div class="stat-label">未結清</div></div>
    <div class="stat-box"><div class="stat-num">${filtered.length}</div><div class="stat-label">案件數</div></div>
    <div class="stat-box"><div class="stat-num">${allExp.length}</div><div class="stat-label">費用筆數</div></div>
  `;

  // 廠商統計
  const vMap={};
  allExp.forEach(e=>{
    if(!vMap[e.vendor])vMap[e.vendor]={total:0,count:0};
    vMap[e.vendor].total+=e.amount;vMap[e.vendor].count++;
  });
  document.getElementById('vendorStats').innerHTML=Object.entries(vMap)
    .sort((a,b)=>b[1].total-a[1].total)
    .map(([v,d])=>`<div class="summary-row">
      <div class="summary-name"><span class="chip chip-${v}">${v}</span></div>
      <div class="summary-right">
        <div class="summary-amount">$${d.total.toLocaleString()}</div>
        <div class="summary-sub">${d.count}筆</div>
      </div>
    </div>`).join('')||'<div style="color:var(--text2);font-size:13px;padding:10px 0;text-align:center;">尚無資料</div>';

  // 月份統計
  const mMap={};
  cases.forEach(c=>{
    const m=c.month||'未知';
    if(!mMap[m])mMap[m]={total:0,unpaid:0,count:0};
    const ct=c.expenses.reduce((s,e)=>s+e.amount,0);
    mMap[m].total+=ct;mMap[m].count++;
    if(!c.paid)mMap[m].unpaid+=ct;
  });
  document.getElementById('monthStats').innerHTML=Object.entries(mMap)
    .sort((a,b)=>b[0].localeCompare(a[0]))
    .map(([m,d])=>`<div class="summary-row">
      <div>
        <div class="summary-name">${m.replace('-','年')}月</div>
        <div class="summary-sub">${d.count}件　未結清 $${d.unpaid.toLocaleString()}</div>
      </div>
      <div class="summary-amount">$${d.total.toLocaleString()}</div>
    </div>`).join('')||'<div style="color:var(--text2);font-size:13px;padding:10px 0;text-align:center;">尚無資料</div>';
}

function setStatsMonth(m){statsMonth=m;renderStats();}

// ════════════════════════════════════════════
// 工具
// ════════════════════════════════════════════
function showPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('.nav button')[{cases:0,stats:1}[p]].classList.add('active');
  if(p==='stats')renderStats();
}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

init();
</script>
